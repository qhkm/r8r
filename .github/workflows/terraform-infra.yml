name: Terraform Infra

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-infra.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
      workspace:
        description: "Terraform workspace"
        required: true
        default: "default"
        type: string
      tfvars_file:
        description: "Path to tfvars file (relative to infra/)"
        required: true
        default: "terraform.tfvars"
        type: string
      aws_region:
        description: "AWS region"
        required: true
        default: "us-east-1"
        type: string

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "true"

jobs:
  fmt_validate:
    name: Terraform Fmt and Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Check formatting
        run: terraform fmt -check -recursive infra

      - name: Init (no backend)
        working-directory: infra
        run: terraform init -backend=false

      - name: Validate
        working-directory: infra
        run: terraform validate

  plan:
    name: Terraform Plan
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: fmt_validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Require remote backend for apply mode
        if: ${{ github.event.inputs.action == 'apply' }}
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: |
          if [ -z "${TF_STATE_BUCKET:-}" ]; then
            echo "TF_STATE_BUCKET secret is required when action=apply."
            exit 1
          fi

      - name: Terraform Init
        working-directory: infra
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
          TF_STATE_KEY_PREFIX: ${{ secrets.TF_STATE_KEY_PREFIX }}
        run: |
          if [ -n "${TF_STATE_BUCKET:-}" ]; then
            key_prefix="${TF_STATE_KEY_PREFIX:-r8r}"
            lock_table="${TF_STATE_LOCK_TABLE:-terraform-locks}"
            terraform init \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=${key_prefix}/${{ github.event.inputs.workspace }}.tfstate" \
              -backend-config="region=${{ github.event.inputs.aws_region }}" \
              -backend-config="dynamodb_table=${lock_table}" \
              -backend-config="encrypt=true"
          else
            terraform init
          fi

      - name: Select workspace
        working-directory: infra
        run: |
          terraform workspace select "${{ github.event.inputs.workspace }}" || \
          terraform workspace new "${{ github.event.inputs.workspace }}"

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -var-file="${{ github.event.inputs.tfvars_file }}" -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/tfplan

  apply:
    name: Terraform Apply
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' }}
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: infra

      - name: Require remote backend
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: |
          if [ -z "${TF_STATE_BUCKET:-}" ]; then
            echo "TF_STATE_BUCKET secret is required for apply."
            exit 1
          fi

      - name: Terraform Init
        working-directory: infra
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
          TF_STATE_KEY_PREFIX: ${{ secrets.TF_STATE_KEY_PREFIX }}
        run: |
          if [ -n "${TF_STATE_BUCKET:-}" ]; then
            key_prefix="${TF_STATE_KEY_PREFIX:-r8r}"
            lock_table="${TF_STATE_LOCK_TABLE:-terraform-locks}"
            terraform init \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=${key_prefix}/${{ github.event.inputs.workspace }}.tfstate" \
              -backend-config="region=${{ github.event.inputs.aws_region }}" \
              -backend-config="dynamodb_table=${lock_table}" \
              -backend-config="encrypt=true"
          else
            terraform init
          fi

      - name: Select workspace
        working-directory: infra
        run: |
          terraform workspace select "${{ github.event.inputs.workspace }}" || \
          terraform workspace new "${{ github.event.inputs.workspace }}"

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan
